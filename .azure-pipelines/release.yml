name: $(Date:yyyyMMdd)$(Rev:.r)
trigger: none
pr: none

resources:
  repositories:
    - repository: 1ESPipelines
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release

parameters:
  - name: 'esrp'
    type: boolean
    default: true
    displayName: 'Enable ESRP code signing'
  - name: 'github'
    type: boolean
    default: true
    displayName: 'Enable GitHub release publishing'
  - name: 'nuget'
    type: boolean
    default: true
    displayName: 'Enable NuGet package publishing'

#
# 1ES Pipeline Templates do not allow using a matrix strategy so we create
# a YAML object parameter with and foreach to create jobs for each entry.
# Each OS has its own matrix object since their build steps differ.
#
  - name: windows_matrix
    type: object
    default:
      - id: windows_x86
        jobName: 'Windows (x86)'
        runtime: win-x86
        pool: GitClientPME-1ESHostedPool-intel-pc
        poolArch: amd64
        image: win-x86_64-ado1es
        os: windows
      - id: windows_x64
        jobName: 'Windows (x64)'
        runtime: win-x64
        pool: GitClientPME-1ESHostedPool-intel-pc
        poolArch: amd64
        image: win-x86_64-ado1es
        os: windows
      - id: windows_arm64
        jobName: 'Windows (ARM64)'
        runtime: win-arm64
        pool: GitClientPME-1ESHostedPool-arm64-pc
        poolArch: arm64
        image: win-arm64-ado1es
        os: windows

  - name: macos_matrix
    type: object
    default:
      - id: macos_x64
        jobName: 'macOS (x64)'
        runtime: osx-x64
        pool: 'Azure Pipelines'
        image: macOS-latest
        os: macos
      - id: macos_arm64
        jobName: 'macOS (ARM64)'
        runtime: osx-arm64
        pool: 'Azure Pipelines'
        image: macOS-latest
        os: macos

  - name: linux_matrix
    type: object
    default:
      - id: linux_x64
        jobName: 'Linux (x64)'
        runtime: linux-x64
        pool: GitClientPME-1ESHostedPool-intel-pc
        poolArch: amd64
        image: ubuntu-x86_64-ado1es
        os: linux
      - id: linux_arm64
        jobName: 'Linux (ARM64)'
        runtime: linux-arm64
        pool: GitClientPME-1ESHostedPool-arm64-pc
        poolArch: arm64
        image: ubuntu-arm64-ado1es
        os: linux

variables:
  - name: 'esrpAppConnectionName'
    value: '1ESGitClient-ESRP-App'
  - name: 'esrpMIConnectionName'
    value: '1ESGitClient-ESRP-MI'
  - name: 'githubConnectionName'
    value: 'GitHub-GitCredentialManager'
  - name: 'nugetConnectionName'
    value: '1ESGitClient-NuGet'
  # ESRP signing variables set in the pipeline settings:
  # - esrpEndpointUrl
  # - esrpClientId
  # - esrpTenantId
  # - esrpKeyVaultName
  # - esrpSignReqCertName

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelines
  parameters:
    sdl:
      # SDL source analysis tasks only run on Windows images
      sourceAnalysisPool:
        name: GitClientPME-1ESHostedPool-intel-pc
        image: win-x86_64-ado1es
        os: windows
    stages:
      - stage: build
        displayName: 'Build and Sign'
        jobs:
          #
          # Windows build jobs
          #
          - ${{ each dim in parameters.windows_matrix }}:
            - job: ${{ dim.id }}
              displayName: ${{ dim.jobName }}
              pool:
                name: ${{ dim.pool }}
                image: ${{ dim.image }}
                os: ${{ dim.os }}
                hostArchitecture: ${{ dim.poolArch }}
              templateContext:
                outputs:
                  - output: pipelineArtifact
                    targetPath: '$(Build.ArtifactStagingDirectory)\_final'
                    artifactName: '${{ dim.runtime }}'
              steps:
                - checkout: self
                - task: PowerShell@2
                  displayName: 'Install .NET 10 SDK'
                  inputs:
                    targetType: inline
                    script: |
                      # UseDotNet@2 mis-detects Windows-on-Arm agents as win-x86
                      # and installs the 32-bit SDK, which breaks the win-arm64
                      # AOT publish. Call dotnet-install directly, keyed on the
                      # agent architecture, so each leg gets a matching host SDK.
                      $ProgressPreference = 'SilentlyContinue'
                      $installDir = Join-Path $env:AGENT_TEMPDIRECTORY 'dotnet'
                      $installer = Join-Path $env:AGENT_TEMPDIRECTORY 'dotnet-install.ps1'
                      Invoke-WebRequest -Uri 'https://dot.net/v1/dotnet-install.ps1' -OutFile $installer
                      & $installer -Channel 10.0 -Architecture ${{ dim.poolArch }} -InstallDir $installDir
                      Write-Host "##vso[task.prependpath]$installDir"
                # Native AOT links the published binary with the MSVC linker,
                # which our images do not ship by default. Install the VC++
                # build tools for the agent's architecture first.
                - task: PowerShell@2
                  displayName: 'Install C++ build tools for AOT'
                  inputs:
                    filePath: '.azure-pipelines/scripts/windows/setup-aot-build-tools.ps1'
                    arguments: -Architecture ${{ dim.poolArch }}
                - task: PowerShell@2
                  displayName: 'Publish payload'
                  inputs:
                    pwsh: true
                    targetType: filePath
                    filePath: '.\build\windows\publish.ps1'
                    arguments: -Configuration release -Runtime ${{ dim.runtime }}
                # Sign the payload binaries before they are packaged into the
                # installers.
                - ${{ if eq(parameters.esrp, true) }}:
                  - template: .azure-pipelines/esrp/sign.yml@self
                    parameters:
                      displayName: 'Sign payload'
                      folderPath: '$(Build.SourcesDirectory)\out\publish\git-credential-manager\release_${{ dim.runtime }}'
                      pattern: '**/*.{exe,dll}'
                      inlineOperation: |
                        [
                          {
                            "KeyCode": "CP-230012",
                            "OperationCode": "SigntoolSign",
                            "ToolName": "sign",
                            "ToolVersion": "1.0",
                            "Parameters": {
                              "OpusName": "Microsoft",
                              "OpusInfo": "https://www.microsoft.com",
                              "FileDigest": "/fd SHA256",
                              "PageHash": "/NPH",
                              "TimeStamp": "/tr \"http://rfc3161.gtm.corp.microsoft.com/TSS/HttpTspServer\" /td sha256"
                            }
                          },
                          {
                            "KeyCode": "CP-230012",
                            "OperationCode": "SigntoolVerify",
                            "ToolName": "sign",
                            "ToolVersion": "1.0",
                            "Parameters": {}
                          }
                        ]
                # Download the Inno Setup compiler (ISCC.exe) used by pack.ps1 to
                # build the installers, and expose its path to the pack step. The
                # script downloads the Tools.InnoSetup version pinned in
                # Directory.Packages.props.
                - task: PowerShell@2
                  displayName: 'Download Inno Setup'
                  inputs:
                    pwsh: true
                    targetType: inline
                    script: |
                      $inno = & "$(Build.SourcesDirectory)\.azure-pipelines\scripts\windows\download-innosetup.ps1" -OutputPath "$(Agent.TempDirectory)\innosetup"
                      Write-Host "Resolved Inno Setup $($inno.Version): $($inno.Path)"
                      Write-Host "##vso[task.setvariable variable=innoSetupCompiler]$($inno.Path)"
                # Build the installer packages (.exe) from the signed payload
                - task: PowerShell@2
                  displayName: 'Build installers'
                  inputs:
                    pwsh: true
                    targetType: filePath
                    filePath: '.\build\windows\pack.ps1'
                    arguments: -Configuration release -Runtime ${{ dim.runtime }} -InnoSetup "$(innoSetupCompiler)"
                # Sign the installer executables
                - ${{ if eq(parameters.esrp, true) }}:
                  - template: .azure-pipelines/esrp/sign.yml@self
                    parameters:
                      displayName: 'Sign installers'
                      folderPath: '$(Build.SourcesDirectory)\out\package\release'
                      pattern: '**/*.exe'
                      inlineOperation: |
                        [
                          {
                            "KeyCode": "CP-230012",
                            "OperationCode": "SigntoolSign",
                            "ToolName": "sign",
                            "ToolVersion": "1.0",
                            "Parameters": {
                              "OpusName": "Microsoft",
                              "OpusInfo": "https://www.microsoft.com",
                              "FileDigest": "/fd SHA256",
                              "PageHash": "/NPH",
                              "TimeStamp": "/tr \"http://rfc3161.gtm.corp.microsoft.com/TSS/HttpTspServer\" /td sha256"
                            }
                          },
                          {
                            "KeyCode": "CP-230012",
                            "OperationCode": "SigntoolVerify",
                            "ToolName": "sign",
                            "ToolVersion": "1.0",
                            "Parameters": {}
                          }
                        ]
                # Archive the signed payload (.zip) alongside the installers
                - task: PowerShell@2
                  displayName: 'Archive payload'
                  inputs:
                    pwsh: true
                    targetType: filePath
                    filePath: '.\build\windows\archive.ps1'
                    arguments: -Configuration release -Runtime ${{ dim.runtime }}
                - task: PowerShell@2
                  displayName: 'Collect artifacts for publishing'
                  inputs:
                    pwsh: true
                    targetType: inline
                    script: |
                      New-Item -Path "$(Build.ArtifactStagingDirectory)\_final" -ItemType Directory -Force
                      Copy-Item "$(Build.SourcesDirectory)\out\package\release\*.exe" -Destination "$(Build.ArtifactStagingDirectory)\_final"
                      Copy-Item "$(Build.SourcesDirectory)\out\package\release\*.zip" -Destination "$(Build.ArtifactStagingDirectory)\_final"

          #
          # macOS build jobs
          #
          - ${{ each dim in parameters.macos_matrix }}:
            - job: ${{ dim.id }}
              displayName: ${{ dim.jobName }}
              pool:
                name: ${{ dim.pool }}
                image: ${{ dim.image }}
                os: ${{ dim.os }}
              templateContext:
                outputs:
                  - output: pipelineArtifact
                    targetPath: '$(Build.ArtifactStagingDirectory)/_final'
                    artifactName: '${{ dim.runtime }}'
              steps:
                - checkout: self
                - task: UseDotNet@2
                  displayName: 'Use .NET 10 SDK'
                  inputs:
                    packageType: sdk
                    version: '10.x'
                - task: Bash@3
                  displayName: 'Publish payload'
                  inputs:
                    targetType: filePath
                    filePath: './build/macos/publish.sh'
                    arguments: |
                      --configuration release \
                      --runtime ${{ dim.runtime }}
                - ${{ if eq(parameters.esrp, true) }}:
                  - task: AzureCLI@2
                    displayName: 'Import developer certificate'
                    inputs:
                      azureSubscription: '$(esrpMIConnectionName)'
                      scriptType: bash
                      scriptLocation: inlineScript
                      inlineScript: |
                        set -euo pipefail
                        identity=$(./.azure-pipelines/scripts/macos/import-developer-certificate.sh \
                          --vault "$(esrpKeyVaultName)" \
                          --keychain "$(Agent.TempDirectory)/buildagent.keychain")
                        echo "##vso[task.setvariable variable=macDevCertIdentity;issecret=true]$identity"
                # Developer-sign the payload (attaching entitlements and the
                # hardened runtime) and then ESRP-sign the Mach-O binaries in
                # place.
                - ${{ if eq(parameters.esrp, true) }}:
                  - task: Bash@3
                    displayName: 'Developer-sign payload'
                    inputs:
                      targetType: filePath
                      filePath: './build/macos/codesign.sh'
                      arguments: |
                        developer \
                        --bindir "$(Build.SourcesDirectory)/out/publish/git-credential-manager/release_${{ dim.runtime }}" \
                        --identity "$(macDevCertIdentity)"
                  - template: .azure-pipelines/esrp/sign.yml@self
                    parameters:
                      displayName: 'Sign payload'
                      folderPath: '$(Build.SourcesDirectory)/out/publish/git-credential-manager/release_${{ dim.runtime }}'
                      pattern: '**/*'
                      useArchive: true # Required for macOS signing
                      archiveMimeFilter: 'application/x-mach-binary' # Sign only Mach-O binaries
                      inlineOperation: |
                        [
                          {
                            "KeyCode": "CP-401337-Apple",
                            "OperationCode": "MacAppDeveloperSign",
                            "ToolName": "sign",
                            "ToolVersion": "1.0",
                            "Parameters": {
                              "Hardening": "Enable"
                            }
                          }
                        ]
                # Package the (signed) binaries into the installer (.pkg)
                - task: Bash@3
                  displayName: 'Build installer'
                  inputs:
                    targetType: filePath
                    filePath: './build/macos/pack.sh'
                    arguments: |
                      --configuration release \
                      --runtime ${{ dim.runtime }}
                # ESRP-sign and notarize the installer package
                - ${{ if eq(parameters.esrp, true) }}:
                  - template: .azure-pipelines/esrp/sign.yml@self
                    parameters:
                      displayName: 'Sign installer'
                      folderPath: '$(Build.SourcesDirectory)/out/package/release'
                      pattern: '*.pkg'
                      useArchive: true # Required for macOS signing
                      inlineOperation: |
                        [
                          {
                            "KeyCode": "CP-401337-Apple",
                            "OperationCode": "MacAppDeveloperSign",
                            "ToolName": "sign",
                            "ToolVersion": "1.0",
                            "Parameters": {
                              "Hardening": "Enable"
                            }
                          }
                        ]
                  - template: .azure-pipelines/esrp/sign.yml@self
                    parameters:
                      displayName: 'Notarize installer'
                      folderPath: '$(Build.SourcesDirectory)/out/package/release'
                      pattern: '*.pkg'
                      useArchive: false # Notarization takes the .pkg container directly without archiving
                      inlineOperation: |
                        [
                          {
                            "KeyCode": "CP-401337-Apple",
                            "OperationCode": "MacAppNotarize",
                            "ToolName": "sign",
                            "ToolVersion": "1.0",
                            "Parameters": {
                              "BundleId": "com.microsoft.gitcredentialmanager"
                            }
                          }
                        ]
                # Create the (signed) binaries and symbols tarballs
                - task: Bash@3
                  displayName: 'Archive payload'
                  inputs:
                    targetType: filePath
                    filePath: './build/macos/archive.sh'
                    arguments: |
                      --configuration release \
                      --runtime ${{ dim.runtime }}
                - task: Bash@3
                  displayName: 'Collect artifacts for publishing'
                  inputs:
                    targetType: inline
                    script: |
                      mkdir -p $(Build.ArtifactStagingDirectory)/_final
                      cp $(Build.SourcesDirectory)/out/package/release/*.pkg $(Build.ArtifactStagingDirectory)/_final
                      cp $(Build.SourcesDirectory)/out/package/release/*.tar.gz $(Build.ArtifactStagingDirectory)/_final

          #
          # Linux build jobs
          #
          - ${{ each dim in parameters.linux_matrix }}:
            - job: ${{ dim.id }}
              displayName: ${{ dim.jobName }}
              pool:
                name: ${{ dim.pool }}
                image: ${{ dim.image }}
                os: ${{ dim.os }}
                hostArchitecture: ${{ dim.poolArch }}
              templateContext:
                outputs:
                  - output: pipelineArtifact
                    targetPath: '$(Build.ArtifactStagingDirectory)/_final'
                    artifactName: '${{ dim.runtime }}'
              steps:
                - checkout: self
                - task: UseDotNet@2
                  displayName: 'Use .NET 10 SDK'
                  inputs:
                    packageType: sdk
                    version: '10.x'
                # Publish the application payload
                - task: Bash@3
                  displayName: 'Publish payload'
                  inputs:
                    targetType: filePath
                    filePath: './build/linux/publish.sh'
                    arguments: |
                      --configuration release \
                      --runtime ${{ dim.runtime }}
                # Build the package (.deb) from the payload
                - task: Bash@3
                  displayName: 'Build package'
                  inputs:
                    targetType: filePath
                    filePath: './build/linux/pack.sh'
                    arguments: |
                      --configuration release \
                      --runtime ${{ dim.runtime }}
                # ESRP-sign the Debian package
                - ${{ if eq(parameters.esrp, true) }}:
                  - template: .azure-pipelines/esrp/sign.yml@self
                    parameters:
                      displayName: 'Sign Debian package'
                      folderPath: '$(Build.SourcesDirectory)/out/package/release'
                      pattern: '**/*.deb'
                      inlineOperation: |
                        [
                          {
                            "KeyCode": "CP-453387-Pgp",
                            "OperationCode": "LinuxSign",
                            "ToolName": "sign",
                            "ToolVersion": "1.0",
                            "Parameters": {}
                          }
                        ]
                # Create the binaries and symbols tarballs
                - task: Bash@3
                  displayName: 'Archive payload'
                  inputs:
                    targetType: filePath
                    filePath: './build/linux/archive.sh'
                    arguments: |
                      --configuration release \
                      --runtime ${{ dim.runtime }}
                - task: Bash@3
                  displayName: 'Collect artifacts for publishing'
                  inputs:
                    targetType: inline
                    script: |
                      mkdir -p $(Build.ArtifactStagingDirectory)/_final
                      cp $(Build.SourcesDirectory)/out/package/release/*.deb $(Build.ArtifactStagingDirectory)/_final
                      cp $(Build.SourcesDirectory)/out/package/release/*.tar.gz $(Build.ArtifactStagingDirectory)/_final

          #
          # .NET tool build job
          #
          - job: dotnet_tool
            displayName: '.NET Tool NuGet Package'
            # The tool is portable IL and doesn't require platform-specific
            # builds. Linux is the fastest hosted agent to provision so use it!
            pool:
              name: GitClientPME-1ESHostedPool-intel-pc
              image: ubuntu-x86_64-ado1es
              os: linux
              hostArchitecture: amd64
            templateContext:
              outputs:
                - output: pipelineArtifact
                  targetPath: '$(Build.ArtifactStagingDirectory)/_final'
                  artifactName: 'dotnet-tool'
            steps:
              - checkout: self
              - task: UseDotNet@2
                displayName: 'Use .NET 10 SDK'
                inputs:
                  packageType: sdk
                  version: '10.x'
              - task: Bash@3
                displayName: 'Publish payload'
                inputs:
                  targetType: filePath
                  filePath: './build/dntool/publish.sh'
                  arguments: --configuration release
              # ESRP-sign (Authenticode) the managed assemblies before packing
              - ${{ if eq(parameters.esrp, true) }}:
                - template: .azure-pipelines/esrp/sign.yml@self
                  parameters:
                    displayName: 'Sign payload'
                    folderPath: '$(Build.SourcesDirectory)/out/publish/dntool/release'
                    pattern: '**/*.dll'
                    inlineOperation: |
                      [
                        {
                          "KeyCode": "CP-230012",
                          "OperationCode": "SigntoolSign",
                          "ToolName": "sign",
                          "ToolVersion": "1.0",
                          "Parameters": {
                            "OpusName": "Microsoft",
                            "OpusInfo": "https://www.microsoft.com",
                            "FileDigest": "/fd SHA256",
                            "PageHash": "/NPH",
                            "TimeStamp": "/tr \"http://rfc3161.gtm.corp.microsoft.com/TSS/HttpTspServer\" /td sha256"
                          }
                        },
                        {
                          "KeyCode": "CP-230012",
                          "OperationCode": "SigntoolVerify",
                          "ToolName": "sign",
                          "ToolVersion": "1.0",
                          "Parameters": {}
                        }
                      ]
              # Pack the signed payload into the .nupkg
              - task: Bash@3
                displayName: 'Create NuGet packages'
                inputs:
                  targetType: filePath
                  filePath: './build/dntool/pack.sh'
                  arguments: --configuration release
              - task: Bash@3
                displayName: 'Collect artifacts for publishing'
                inputs:
                  targetType: inline
                  script: |
                    mkdir -p $(Build.ArtifactStagingDirectory)/_final
                    cp $(Build.SourcesDirectory)/out/package/release/*.nupkg $(Build.ArtifactStagingDirectory)/_final

      - stage: release
        displayName: 'Release'
        dependsOn: [build]
        condition: and(succeeded(), or(eq('${{ parameters.github }}', true), eq('${{ parameters.nuget }}', true)))
        jobs:
          - job: release_validation
            displayName: 'Release validation'
            pool:
              name: GitClientPME-1ESHostedPool-intel-pc
              image: ubuntu-x86_64-ado1es
              os: linux
            steps:
              - task: Bash@3
                displayName: 'Read version file'
                name: version
                inputs:
                  targetType: inline
                  script: |
                    echo "##vso[task.setvariable variable=value;isOutput=true;isReadOnly=true]$(cat ./VERSION | sed -E 's/.[0-9]+$//')"

          - job: github
            displayName: 'Publish GitHub release'
            dependsOn: release_validation
            condition: and(succeeded(), eq('${{ parameters.github }}', true))
            pool:
              name: GitClientPME-1ESHostedPool-intel-pc
              image: ubuntu-x86_64-ado1es
              os: linux
            variables:
              version: $[dependencies.release_validation.outputs['version.value']]
            templateContext:
              type: releaseJob
              isProduction: true
              inputs:
                # Installers and packages
                - input: pipelineArtifact
                  artifactName: 'win-x86'
                  targetPath: $(Pipeline.Workspace)/assets/win-x86
                - input: pipelineArtifact
                  artifactName: 'win-x64'
                  targetPath: $(Pipeline.Workspace)/assets/win-x64
                - input: pipelineArtifact
                  artifactName: 'win-arm64'
                  targetPath: $(Pipeline.Workspace)/assets/win-arm64
                - input: pipelineArtifact
                  artifactName: 'osx-x64'
                  targetPath: $(Pipeline.Workspace)/assets/osx-x64
                - input: pipelineArtifact
                  artifactName: 'osx-arm64'
                  targetPath: $(Pipeline.Workspace)/assets/osx-arm64
                - input: pipelineArtifact
                  artifactName: 'linux-x64'
                  targetPath: $(Pipeline.Workspace)/assets/linux-x64
                - input: pipelineArtifact
                  artifactName: 'linux-arm64'
                  targetPath: $(Pipeline.Workspace)/assets/linux-arm64
                - input: pipelineArtifact
                  artifactName: 'dotnet-tool'
                  targetPath: $(Pipeline.Workspace)/assets/dotnet-tool
            steps:
              - task: GitHubRelease@1
                displayName: 'Create Draft GitHub Release'
                condition: and(succeeded(), eq('${{ parameters.github }}', true))
                inputs:
                  gitHubConnection: $(githubConnectionName)
                  repositoryName: git-ecosystem/git-credential-manager
                  tag: 'v$(version)'
                  tagSource: userSpecifiedTag
                  target: release
                  title: 'GCM $(version)'
                  isDraft: true
                  addChangeLog: false
                  assets: |
                    $(Pipeline.Workspace)/assets/win-x86/*.exe
                    $(Pipeline.Workspace)/assets/win-x86/*.zip
                    $(Pipeline.Workspace)/assets/win-x64/*.exe
                    $(Pipeline.Workspace)/assets/win-x64/*.zip
                    $(Pipeline.Workspace)/assets/win-arm64/*.exe
                    $(Pipeline.Workspace)/assets/win-arm64/*.zip
                    $(Pipeline.Workspace)/assets/osx-x64/*.pkg
                    $(Pipeline.Workspace)/assets/osx-x64/*.tar.gz
                    $(Pipeline.Workspace)/assets/osx-arm64/*.pkg
                    $(Pipeline.Workspace)/assets/osx-arm64/*.tar.gz
                    $(Pipeline.Workspace)/assets/linux-x64/*.deb
                    $(Pipeline.Workspace)/assets/linux-x64/*.tar.gz
                    $(Pipeline.Workspace)/assets/linux-arm64/*.deb
                    $(Pipeline.Workspace)/assets/linux-arm64/*.tar.gz
                    $(Pipeline.Workspace)/assets/dotnet-tool/*.nupkg

          - job: nuget
            displayName: 'Publish NuGet package'
            dependsOn: release_validation
            condition: and(succeeded(), eq('${{ parameters.nuget }}', true))
            pool:
              # Run on Windows so the underlying NuGetCommand@2 task can use the
              # native nuget.exe. On Ubuntu 24.04+ the legacy NuGet task fails
              # because Mono is no longer available.
              # See https://aka.ms/nuget-task-mono.
              name: GitClientPME-1ESHostedPool-intel-pc
              image: win-x86_64-ado1es
              os: windows
            variables:
              version: $[dependencies.release_validation.outputs['version.value']]
            templateContext:
              inputs:
                - input: pipelineArtifact
                  artifactName: 'dotnet-tool'
                  targetPath: $(Pipeline.Workspace)/assets/dotnet-tool
              outputs:
                - output: nuget
                  condition: and(succeeded(), eq('${{ parameters.nuget }}', true))
                  displayName: 'Publish .NET Tool NuGet package'
                  packagesToPush: '$(Pipeline.Workspace)/assets/dotnet-tool/*.nupkg'
                  packageParentPath: $(Pipeline.Workspace)/assets/dotnet-tool
                  nuGetFeedType: external
                  publishPackageMetadata: true
                  publishFeedCredentials: $(nugetConnectionName)
